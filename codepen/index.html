<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CodePen Clone</title>

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

    <div class="nav-left">

        <!-- LOGO -->
        <img src="images/codepen-wordmark-display-inside-white@10x-768x145.png" class="logo">

        <!-- MENU -->
        <div class="nav-menu">
            <span class="explore">EXPLORE</span>

            <ul class="nav-links">
                <li>Pens</li>
                <li>Projects</li>
                <li>Posts</li>
                <li>Collections</li>
                <li>Spark ▼</li>
            </ul>
        </div>

    </div>

    <!-- RIGHT NAV -->
    <div class="auth-buttons">

        <button class="btn-pill">
            Create <i class="fa-solid fa-check"></i>
        </button>

        <i class="fa-solid fa-magnifying-glass"></i>

        <button class="btn-pill">Log In</button>
        <button class="btn-pill signup">Sign Up</button>

    </div>

</nav>

<!-- HERO -->
<section class="hero">

    <div class="left">

        <h2>The best place to build, test, and discover front-end code.</h2>

        <p>
            CodePen is a social development environment for front-end designers and developers.
        </p>

        <button class="btn-primary">Sign Up</button>
        <button class="btn-secondary">Learn More</button>

    </div>

    <div class="right">

        <img src="images/image-portion-of-the-page.png" alt="preview">

    </div>

</section>

<!-- FOOTER -->
<footer class="footer">

    <div class="footer-item">CodePen for <span>Teams</span></div>
    <div class="footer-item">CodePen for <span>Education</span></div>
    <div class="footer-item">CodePen for <span>Privacy</span></div>
    <div class="footer-item">CodePen for <span>Writing</span></div>

</footer>

</body>
</html>
